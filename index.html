<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shodan Games - Indie Game Developer Portfolio showcasing Unity and HTML5 games">
    <meta name="keywords" content="game development, unity, html5 games, indie games, portfolio">
    <meta name="author" content="Shahid Shaikh">
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Shodan Games - Game Developer Portfolio">
    <meta property="og:description" content="Check out my indie game portfolio featuring Unity and HTML5 games">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://shahid-shaikh02.github.io/shodan-games/">

    <meta charset="utf-8" />
    <title>Ball Escape — Canvas Version</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="Resources/favicon-32x32.png" type="image/x-icon">
    <link rel="shortcut icon" href="Resources/favicon-16x16.png" type="image/x-icon" />
    
    <title>Shodan Games - Portfolio</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Favicon (optional - add your own) -->
    <!-- <link rel="icon" type="image/png" href="favicon.png"> -->
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🎮 Shodan Games</h1>
            <p>Indie Game Developer Portfolio</p>
        </header>

        <!-- Loading State -->
        <div id="loading" class="loading">
            Loading games...
        </div>

        <!-- Featured Games Section -->
        <section id="featured-section" style="display: none;">
            <h2 class="section-title">⭐ Featured Games</h2>
            <div id="featured-games" class="games-grid"></div>
        </section>

        <!-- Unity Games Section -->
        <section id="unity-section" style="display: none;">
            <h2 class="section-title">🎯 Unity Games</h2>
            <div id="unity-games" class="games-grid"></div>
        </section>

        <!-- HTML5 Games Section -->
        <section id="html-section" style="display: none;">
            <h2 class="section-title">🌐 HTML5 Games</h2>
            <div id="html-games" class="games-grid"></div>
        </section>

        <!-- Empty State (if no games found) -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <h3>No Games Yet</h3>
            <p>Games will appear here once you add them to games-list.json</p>
        </div>

        <!-- Footer -->
        <footer>
            <p>Made with ❤️ by Shodan</p>
            <p>
                <a href="https://mail.google.com/mail/?view=cm&fs=1&to=shodansstudio@gmail.com" target="_blank" rel="noopener">📧 Email</a>
                <a href="https://www.youtube.com/@shodangp" target="_blank" rel="noopener">🎮 Gaming Channel</a>
                <a href="https://www.youtube.com/@shodan_dev" target="_blank" rel="noopener">💻 Dev Channel</a>
                <a href="https://github.com/Shahid-Shaikh02" target="_blank" rel="noopener">💼 GitHub</a>
            </p>
        </footer>
    </div>

    <!-- Game Modal -->
    <div id="game-modal" class="modal">
        <button class="close-modal" onclick="closeGame()" aria-label="Close game">✕</button>
        <div class="modal-content">
            <iframe id="game-frame" src="" title="Game Player"></iframe>
        </div>
    </div>

    <!-- External JavaScript -->
    <script src="script.js"></script>
</body>
</html>
